<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Ryan's Travels</title>

    <!-- PhotoSwipe CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@4.1.3/dist/default-skin/default-skin.min.css"/>

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="theme-dark">
    <div class="app-container">
        <!-- Sidebar navigation (shared with the map) -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-nav">
                    <button type="button" class="sidebar-back" id="sidebar-back">&larr; Back</button>
                    <a class="sidebar-homeicon" href="/index.html" title="Home" aria-label="Home">
                        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                            <path d="M3 11.5 12 4l9 7.5M5.5 9.7V20h13V9.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                </div>
                <h2><a href="https://ryanmcl.myportfolio.com/home" target="_blank" rel="noopener">Exploring Far and Wide</a></h2>
                <a class="sidebar-portfolio-link" href="https://ryanmcl.myportfolio.com/home" target="_blank" rel="noopener">ryanmcl.myportfolio.com</a>
            </div>
            <!-- Trip info summary -->
            <div id="trip-info" class="trip-info">
                <h1 id="trip-name">Loading...</h1>
                <p id="trip-dates"></p>
                <p id="photo-count"></p>
            </div>
            <ul class="nav-list" id="nav-list">
                <!-- Populated by sidebar.js -->
            </ul>
        </nav>

        <!-- Main content -->
        <main class="map-container">
            <div class="gallery-view" id="gallery-view">
                <div class="gallery-toolbar" id="gallery-toolbar"></div>
                <div id="gallery-grid"></div>
            </div>

            <button class="sidebar-toggle" id="sidebar-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- PhotoSwipe lightbox template -->
            <div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
                <div class="pswp__bg"></div>
                <div class="pswp__scroll-wrap">
                    <div class="pswp__container">
                        <div class="pswp__item"></div>
                        <div class="pswp__item"></div>
                        <div class="pswp__item"></div>
                    </div>
                    <div class="pswp__ui pswp__ui--hidden">
                        <div class="pswp__top-bar">
                            <div class="pswp__counter"></div>
                            <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>
                            <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>
                            <div class="pswp__preloader">
                                <div class="pswp__preloader__icn">
                                    <div class="pswp__preloader__cut">
                                        <div class="pswp__preloader__donut"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)"></button>
                        <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)"></button>
                        <div class="pswp__caption"><div class="pswp__caption__center"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- View configuration: gallery.html?trip=<slug>&year=YYYY -->
    <script>
        const _q = new URLSearchParams(location.search);
        const VIEW_CONFIG = {
            mode: 'trip',
            view: 'gallery',
            tripId: _q.get('trip') || null,
            year: _q.get('year') ? parseInt(_q.get('year'), 10) : null,
            basePath: ''
        };

        // "Back" returns to whatever in-site page opened the gallery, falling
        // back to Home when opened directly.
        document.addEventListener('DOMContentLoaded', () => {
            const back = document.getElementById('sidebar-back');
            if (!back) return;
            let sameOriginReferrer = false;
            try {
                sameOriginReferrer = !!document.referrer &&
                    new URL(document.referrer).origin === location.origin;
            } catch (e) { /* malformed referrer */ }
            const canGoBack = sameOriginReferrer && history.length > 1;
            if (!canGoBack) back.textContent = '← Home';
            back.addEventListener('click', () => {
                if (canGoBack) history.back();
                else location.href = '/index.html';
            });
        });
    </script>

    <!-- PhotoSwipe JS -->
    <script src="https://cdn.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/photoswipe@4.1.3/dist/photoswipe-ui-default.min.js"></script>

    <!-- App JS -->
    <script src="js/sidebar.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/gallery-page.js"></script>
</body>
</html>
