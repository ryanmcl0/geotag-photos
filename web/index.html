<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Photography Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>

    <!-- GLightbox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/css/glightbox.min.css"/>

    <!-- Custom styles -->
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Travel Maps</h2>
            </div>
            <!-- Trip info summary -->
            <div id="trip-info" class="trip-info">
                <h1 id="trip-name">Loading...</h1>
                <p id="trip-dates"></p>
                <p id="photo-count"></p>
            </div>
            <ul class="nav-list" id="nav-list">
                <!-- Populated by sidebar.js -->
            </ul>
        </nav>

        <!-- Mobile sidebar toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Main content -->
        <main class="map-container">
            <!-- Map container -->
            <div id="map"></div>

            <!-- EXIF toggle button -->
            <button id="exif-toggle" class="exif-toggle" title="Toggle EXIF info">
                <span>i</span>
            </button>

            <!-- Hidden gallery container for GLightbox -->
            <div id="gallery" class="gallery-hidden"></div>
        </main>
    </div>

    <!-- View configuration -->
    <script>
        const VIEW_CONFIG = {
            mode: 'all',
            year: null,
            tripId: null,
            basePath: ''
        };
    </script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <!-- GLightbox JS -->
    <script src="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/js/glightbox.min.js"></script>

    <!-- App JS -->
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
