<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Maps — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 380px;
            width: 100%;
        }

        h1 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 6px;
            font-weight: 600;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 15px;
            color: #fff;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #e11d48;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #e11d48;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #be123c; }

        .error {
            color: #f87171;
            font-size: 13px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Travel Maps</h1>
        <p>Enter password to continue</p>

        <form method="POST" action="/auth">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus required placeholder="••••••••">
            <script>
                if (new URLSearchParams(location.search).get('error')) {
                    document.write('<div class="error">Incorrect password.</div>');
                }
            </script>
            <button type="submit">Enter</button>
        </form>
    </div>
</body>
</html>
